[alembic]
script_location = app/db/migrations
prepend_sys_path = .

# Fallback URL; env var DATABASE_URL in env.py will override this at runtime.
sqlalchemy.url = postgresql+psycopg2://jobflow:jobflow@pg:5432/jobflow

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s %(message)s
