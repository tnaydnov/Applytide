server {
    listen 80;
    server_name applytide.com www.applytide.com;

    # Redirect everything to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name applytide.com www.applytide.com;

    client_max_body_size 16m;

    # --- SSL ---
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # (Optional but good) Enforce HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # -----------------
    # FRONTEND (Next.js)
    # -----------------
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # These help websockets used by Next dev features / runtime preview,
        # harmless in prod.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Rate limiting (keep if you want it)
        limit_req zone=mylimit burst=20 nodelay;
    }

    # -----------
    # API + WS
    # -----------
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;                     # REQUIRED for WS
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # REQUIRED for WS handshake
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # Compat: support clients that call wss://applytide.com/ws/updates
    # by internally forwarding to /api/ws/updates on the backend.
    location /ws/ {
        proxy_pass http://backend:8000/api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
