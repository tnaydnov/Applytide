# Docker DNS resolver - helps Nginx resolve container IPs dynamically
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

server {
  listen 80;
  server_name applytide.com www.applytide.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name applytide.com www.applytide.com;

  ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;

  # ── TLS hardening ─────────────────────────────────────────────────
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # ── Security headers ──────────────────────────────────────────────
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "0" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

  # CSP — no unsafe-inline / unsafe-eval
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://fonts.googleapis.com; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://applytide.com wss://applytide.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

  client_max_body_size 16m;

  # ── WebSockets ────────────────────────────────────────────────────
  location ^~ /api/v1/ws/ {
      proxy_pass http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 600s;
  }

  # ── Auth endpoints (strict rate-limit) ────────────────────────────
  location ~ ^/api/v1/(auth|login|register|password) {
      limit_req zone=auth_limit burst=10 nodelay;
      limit_req_status 429;

      proxy_pass http://backend:8000;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_set_header X-Forwarded-Port  $server_port;
      proxy_redirect http:// https://;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
      proxy_connect_timeout 10s;
  }

  # ── API (general rate-limit) ──────────────────────────────────────
  location /api/ {
      limit_req zone=api_limit burst=60 nodelay;
      limit_req_status 429;

      proxy_pass http://backend:8000;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_set_header X-Forwarded-Port  $server_port;
      proxy_redirect http:// https://;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      proxy_connect_timeout 60s;

      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
  }

  # ── Frontend ──────────────────────────────────────────────────────
  location / {
      limit_req zone=static_limit burst=40 nodelay;

      proxy_pass http://newfront:3000;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_set_header X-Forwarded-Port  $server_port;
      proxy_redirect http:// https://;

      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
  }
}
