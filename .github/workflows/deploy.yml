name: Build & Deploy to EC2

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # BACKEND API
      - name: Build & Push backend api
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/applytide-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/applytide-backend:latest

      # WORKER
      - name: Build & Push worker
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/applytide-worker:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/applytide-worker:latest

      # FRONTEND
      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/applytide-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/applytide-frontend:latest

      # EMAIL SERVICE
      - name: Build & Push email service
        uses: docker/build-push-action@v6
        with:
          context: ./backend/emails
          file: ./backend/emails/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/applytide-email-service:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/applytide-email-service:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/applytide

            # 1) Update repo so bind-mounted files (nginx, alembic.ini) are fresh
            git fetch --all
            git reset --hard origin/main

            # 2) Login to GHCR if needed (skip if public)
            if [ -n "${{ secrets.GHCR_PAT || '' }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            # 3) Pull & run exact images for this commit
            export GITHUB_OWNER=${{ github.repository_owner }}
            export IMAGE_TAG=${{ github.sha }}
            echo "Deploying OWNER=$GITHUB_OWNER TAG=$IMAGE_TAG"

            GITHUB_OWNER="$GITHUB_OWNER" IMAGE_TAG="$IMAGE_TAG" \
            docker compose -f docker-compose.prod.yml pull

            GITHUB_OWNER="$GITHUB_OWNER" IMAGE_TAG="$IMAGE_TAG" \
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # 4) Wait for services to be healthy
            echo "Waiting for services to stabilize..."
            sleep 5

            # 5) Restart Nginx to pick up new container IPs
            echo "Restarting Nginx to refresh upstream connections..."
            docker compose -f docker-compose.prod.yml restart nginx
            
            # 6) Verify Nginx is healthy
            echo "Verifying Nginx status..."
            docker compose -f docker-compose.prod.yml ps nginx
            
            # 7) Test Nginx configuration
            docker compose -f docker-compose.prod.yml exec -T nginx nginx -t || echo "Warning: Nginx config test failed"

            # 8) Run deployment verification
            echo "Running deployment verification..."
            chmod +x scripts/verify-deployment.sh
            ./scripts/verify-deployment.sh || echo "Warning: Some verification checks failed"

            # 9) Housekeeping
            docker image prune -a -f --filter "until=168h" || true
            docker builder prune -af --filter "until=168h" || true
