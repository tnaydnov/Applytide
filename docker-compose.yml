x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  pg:
    image: postgres:16-alpine
    container_name: applytide_pg
    env_file: .env
    environment:
      POSTGRES_USER: applytide_user
      POSTGRES_DB: applytide_dev
      # POSTGRES_PASSWORD comes from .env
    # ports: ["5432:5432"]  # disabled – local PG already on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    networks: [applytide_network]
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applytide_user -d applytide_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    container_name: applytide_redis
    env_file: .env
    command: sh -c "redis-server --requirepass $$REDIS_PASSWORD --save 60 1000"
    # ports: ["6379:6379"]  # disabled – local Redis already on 6379
    volumes:
      - redis_data:/data
    restart: always
    networks: [applytide_network]
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  maildev:
    image: maildev/maildev:latest
    container_name: applytide_maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - applytide_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: applytide_api
    env_file: .env
    ports: ["8000:8000"]
    restart: always
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [applytide_network]
    logging: *default-logging
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic.ini:/app/alembic.ini
      - documents:/app/uploads/documents
      - attachments:/app/uploads/app_attachments
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  newfront:
    build: ./newfront
    container_name: applytide_web
    restart: always
    networks: [applytide_network]
    logging: *default-logging
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "3000"]
    volumes:
      - ./newfront:/app
      - /app/node_modules

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: applytide_worker
    env_file: .env
    command: ["python", "-m", "app.infra.workers.reminders_runner"]
    restart: always
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [applytide_network]
    volumes:
      - ./backend/alembic.ini:/app/alembic.ini
      - documents:/app/uploads/documents
      - attachments:/app/uploads/app_attachments
    logging: *default-logging
    environment:
      SKIP_MIGRATIONS: "1"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import app; print(1)' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  email_service:
    build:
      context: ./backend/emails
      dockerfile: Dockerfile
    container_name: applytide_email_service
    restart: always
    networks: [applytide_network]
    logging: *default-logging
    environment:
      NODE_ENV: development
      PORT: 3001
    volumes:
      - ./backend/emails:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  nginx:
    image: nginx:1.27-alpine
    container_name: applytide_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/main.conf:/etc/nginx/nginx.conf
    restart: always
    depends_on: [newfront, backend]
    networks: [applytide_network]
    logging: *default-logging

networks:
  applytide_network:
    driver: bridge

volumes:
  pgdata: {}
  redis_data: {}
  documents: {}
  attachments: {}