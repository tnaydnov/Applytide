services:
  pg:
    image: postgres:latest
    container_name: jobflow_pg
    environment:
      POSTGRES_USER: jobflow
      POSTGRES_PASSWORD: jobflow
      POSTGRES_DB: jobflow
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: jobflow_redis
    ports: ["6379:6379"]

  maildev:
    image: maildev/maildev:latest
    container_name: jobflow_maildev
    ports:
      - "1080:1080" # web UI
      - "1025:1025" # SMTP

  backend:
    build: ./backend
    container_name: jobflow_api
    environment:
      PORT: 8000
      ALLOWED_ORIGINS: http://localhost:3000
      DATABASE_URL: postgresql+psycopg2://jobflow:jobflow@pg:5432/jobflow
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: ${SMTP_HOST:-maildev}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-noreply@jobflow.local}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
    ports: ["8000:8000"]
    depends_on: [pg, redis, maildev]
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic.ini:/app/alembic.ini

  frontend:
    build: ./frontend
    container_name: jobflow_web
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [backend]
    volumes:
      - ./frontend:/app
      - /app/node_modules

  worker:
    build: ./backend
    container_name: jobflow_worker
    depends_on: [pg, redis, backend, maildev]
    environment:
      DATABASE_URL: postgresql+psycopg2://jobflow:jobflow@pg:5432/jobflow
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: ${SMTP_HOST:-maildev}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-noreply@jobflow.local}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
    command: ["python", "-m", "app.worker.runner"]

volumes:
  pgdata: {}
