services:
  pg:
    image: postgres:latest
    container_name: applytide_pg
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - applytide_network

  redis:
    image: redis:alpine
    container_name: applytide_redis
    command: redis-server --requirepass redis_password
    ports: ["6379:6379"]
    networks:
      - applytide_network

  maildev:
    image: maildev/maildev:latest
    container_name: applytide_maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - applytide_network

  backend:
    build: ./backend
    container_name: applytide_api
    env_file: .env
    environment:
      PORT: 8000
      ALLOWED_ORIGINS: "http://localhost,https://www.linkedin.com,https://www.indeed.com,https://www.glassdoor.com"
      DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@pg:5432/${DB_NAME}
      REDIS_URL: redis://:redis_password@redis:6379/0
      SMTP_HOST: ${SMTP_HOST:-maildev}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-noreply@applytide.local}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
    networks:
      - applytide_network
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic.ini:/app/alembic.ini

  frontend:
    build: ./frontend
    container_name: applytide_web
    environment:
      NEXT_PUBLIC_API_BASE: /api
    networks:
      - applytide_network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  worker:
    build: ./backend
    container_name: applytide_worker
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@pg:5432/${DB_NAME}
      REDIS_URL: redis://:redis_password@redis:6379/0
      SMTP_HOST: ${SMTP_HOST:-maildev}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-noreply@applytide.local}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
    command: ["python", "-m", "app.worker.runner"]
    networks:
      - applytide_network

  nginx:
    image: nginx:alpine
    container_name: applytide_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - applytide_network

networks:
  applytide_network:
    driver: bridge

volumes:
  pgdata: {}