x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  pg:
    image: postgres:16-alpine
    container_name: applytide_pg
    env_file: .env
    environment:
      POSTGRES_USER: applytide_user
      POSTGRES_DB: applytide_dev
      # POSTGRES_PASSWORD comes from .env
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    networks: [applytide_network]
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: applytide_redis
    env_file: .env
    command: sh -c "redis-server --requirepass $$REDIS_PASSWORD --save 60 1000"
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    restart: always
    networks: [applytide_network]
    logging: *default-logging

  maildev:
    image: maildev/maildev:latest
    container_name: applytide_maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - applytide_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: applytide_api
    env_file: .env
    restart: always
    depends_on: [pg, redis]
    networks: [applytide_network]
    logging: *default-logging
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic.ini:/app/alembic.ini
      - documents:/app/uploads/documents
      - attachments:/app/uploads/app_attachments

  frontend:
    build: ./frontend
    container_name: applytide_web
    environment:
      - NEXT_PUBLIC_API_BASE=/api
    restart: always
    networks: [applytide_network]
    logging: *default-logging
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: applytide_worker
    env_file: .env
    command: ["python", "-m", "app.infra.workers.reminders_runner"]
    restart: always
    depends_on: [pg, redis]
    networks: [applytide_network]
    volumes:
      - ./backend/alembic.ini:/app/alembic.ini
      - documents:/app/uploads/documents
      - attachments:/app/uploads/app_attachments
    logging: *default-logging
    environment:
      SKIP_MIGRATIONS: "1"

  nginx:
    image: nginx:1.27-alpine
    container_name: applytide_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/main.conf:/etc/nginx/nginx.conf
    restart: always
    depends_on: [frontend, backend]
    networks: [applytide_network]
    logging: *default-logging

networks:
  applytide_network:
    driver: bridge

volumes:
  pgdata: {}
  redis_data: {}
  documents: {}
  attachments: {}