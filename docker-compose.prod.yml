version: '3.8'

services:
  pg:
    image: postgres:latest
    container_name: applytide_pg
    environment:
      POSTGRES_USER: applytide_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: applytide_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    networks:
      - applytide_network
    
  redis:
    image: redis:alpine
    container_name: applytide_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
    networks:
      - applytide_network
    
  backend:
    build: ./backend
    container_name: applytide_api
    env_file: .env.production
    restart: always
    depends_on:
      - pg
      - redis
    networks:
      - applytide_network
    
  frontend:
    build: ./frontend
    container_name: applytide_web
    environment:
      - NEXT_PUBLIC_API_BASE=https://applytide.com/api
    restart: always
    networks:
      - applytide_network
    
  worker:
    build: ./backend
    container_name: applytide_worker
    env_file: .env.production
    command: ["python", "-m", "app.worker.runner"]
    restart: always
    depends_on:
      - pg
      - redis
    networks:
      - applytide_network
    volumes:
      - ./backend/alembic.ini:/app/alembic.ini
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    
  nginx:
    image: nginx:alpine
    container_name: applytide_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/main.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/www:/var/www/html
    restart: always
    depends_on:
      - frontend
      - backend
    networks:
      - applytide_network

networks:
  applytide_network:

volumes:
  pgdata:
