x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  pg:
    image: postgres:16-alpine
    container_name: applytide_pg
    env_file: .env.production
    environment:
      POSTGRES_USER: applytide_user
      POSTGRES_DB: applytide_prod
      # POSTGRES_PASSWORD comes from .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    networks: [applytide_network]
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: applytide_redis
    env_file: .env.production
    command: sh -c "redis-server --requirepass $$REDIS_PASSWORD --save 60 1000"
    volumes:
      - redis_data:/data
    restart: always
    networks: [applytide_network]
    logging: *default-logging

  backend:
    image: ghcr.io/${GITHUB_OWNER:-tnaydnov}/applytide-backend:${IMAGE_TAG}
    container_name: applytide_api
    env_file: .env.production
    restart: always
    depends_on: [pg, redis]
    networks: [applytide_network]
    logging: *default-logging
    volumes:
      - documents:/app/uploads/documents
      - attachments:/app/uploads/app_attachments

  frontend:
    image: ghcr.io/${GITHUB_OWNER:-tnaydnov}/applytide-frontend:${IMAGE_TAG}
    container_name: applytide_web
    environment:
      - NEXT_PUBLIC_API_BASE=/api
    restart: always
    networks: [applytide_network]
    logging: *default-logging

  worker:
    image: ghcr.io/${GITHUB_OWNER:-tnaydnov}/applytide-worker:${IMAGE_TAG}
    container_name: applytide_worker
    env_file: .env.production
    command: ["python", "-m", "app.infra.workers.reminders_runner"]
    restart: always
    depends_on: [pg, redis]
    networks: [applytide_network]
    volumes:
      - ./backend/alembic.ini:/app/alembic.ini
      - documents:/app/uploads/documents
      - attachments:/app/uploads/app_attachments
    logging: *default-logging
    environment:
      SKIP_MIGRATIONS: "1"

  email_service:
    image: ghcr.io/${GITHUB_OWNER:-tnaydnov}/applytide-email-service:${IMAGE_TAG}
    container_name: applytide_email_service
    restart: always
    networks: [applytide_network]
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 3001

  nginx:
    image: nginx:1.27-alpine
    container_name: applytide_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/main.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    restart: always
    depends_on: [frontend, backend]
    networks: [applytide_network]
    logging: *default-logging

networks:
  applytide_network:

volumes:
  pgdata:
  redis_data:
  documents:
  attachments:
